appId: com.dohyeon5626.docent
productName: Docent
# We upload artifacts to GitHub Releases ourselves in the release workflow
# (softprops/action-gh-release), so disable electron-builder's own publish —
# otherwise it auto-detects CI + a matching git tag and tries to publish
# itself, failing without a GH_TOKEN.
publish: null
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc.cjs,.prettierrc.yaml,CLAUDE.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
asarUnpack:
  - resources/**
mac:
  target:
    - dmg
    - pkg
  category: public.app-category.education
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
dmg:
  sign: false
pkg:
  identity: null
win:
  target: nsis
linux:
  target: AppImage
  category: Education

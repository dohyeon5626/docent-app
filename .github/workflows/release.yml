name: Release

# Fires when you publish a GitHub Release (for a tag like "v1.2.0").
# Builds the mac app and attaches the .dmg/.pkg to that same release.
# Only adds files — never touches the release's title or description.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Set package version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build app (dmg + pkg)
        run: npm run build:mac

      - name: Attach build artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.pkg
